server:
  port: 8080
  servlet:
    context-path: /franquicias-service

spring:
  application:
    name: franquicias_service
  datasource:
    url: jdbc:postgresql://${DB_HOST}/${DB_NAME}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    com.sandbox.accenture.franquicias_service: DEBUG
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: franquicias-service
    version: 0.0.1-SNAPSHOT
    description: API REST para manejo de franquicias, sucursales y productos

