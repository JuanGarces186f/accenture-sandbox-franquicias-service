name: Build and Deploy to Cloud Run

on:
  push:
    branches: [dev, master]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and Test
        run: ./gradlew clean build test

      - name: Load environment configuration
        id: config
        run: |
          if [ "${{ github.ref }}" == "refs/heads/dev" ]; then
            ENVIRONMENT="dev"
            GCP_SECRET="GCP_CREDENTIALS_DEV"
          elif [ "${{ github.ref }}" == "refs/heads/master" ]; then
            ENVIRONMENT="prod"
            GCP_SECRET="GCP_CREDENTIALS_PROD"
          fi

          echo "ENVIRONMENT=$ENVIRONMENT" >> $GITHUB_ENV
          echo "GCP_SECRET=$GCP_SECRET" >> $GITHUB_ENV

          CONFIG=$(cat workflow-config.json | jq -r ".$ENVIRONMENT")

          echo "GCP_PROJECT_ID=$(echo $CONFIG | jq -r '.gcp_project_id')" >> $GITHUB_ENV
          echo "GCP_REGION=$(echo $CONFIG | jq -r '.gcp_region')" >> $GITHUB_ENV
          echo "ARTIFACT_REGISTRY_REGION=$(echo $CONFIG | jq -r '.artifact_registry_region')" >> $GITHUB_ENV
          echo "SERVICE_NAME=$(echo $CONFIG | jq -r '.service_name')" >> $GITHUB_ENV
          echo "IMAGE_BASE_URL=$(echo $CONFIG | jq -r '.image_url')" >> $GITHUB_ENV

      - name: Build image tag
        run: |
          echo "IMAGE_URL=${{ env.IMAGE_BASE_URL }}" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets[env.GCP_SECRET] }}

      - name: Set GCP Project
        run: |
          gcloud config set project ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_URL }} .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE_URL }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE_URL }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --project ${{ env.GCP_PROJECT_ID }} \
            --quiet
